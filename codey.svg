<svg width="630" height="446" viewBox="0 0 630 446" xmlns="http://www.w3.org/2000/svg">
  <style>
    .ps  { font-family: "Cascadia Code","Courier New",monospace; font-size: 12px; fill: #cccccc; }
    .bar-bg { fill: #1a1a1a; }
    @keyframes grow-hp { from { width:0; } to { width:93.33333333333333px;    } }
    @keyframes grow-hu { from { width:0; } to { width:280px;    } }
    @keyframes grow-ha { from { width:0; } to { width:0.0px; } }
    @keyframes grow-en { from { width:0; } to { width:0.0px;    } }
    @keyframes grow-so { from { width:0; } to { width:175.0px;    } }
    @keyframes grow-qu { from { width:0; } to { width:232.53125000000023px;   } }
    @keyframes blink   { 50% { opacity:0; } }
    .grow-hp { animation: grow-hp 1.5s ease-out forwards; }
    .grow-hu { animation: grow-hu 1.7s ease-out forwards; }
    .grow-ha { animation: grow-ha 1.9s ease-out forwards; }
    .grow-en { animation: grow-en 2.1s ease-out forwards; }
    .grow-so { animation: grow-so 2.3s ease-out forwards; }
    .grow-qu { animation: grow-qu 2.5s ease-out forwards; }
    .blink   { animation: blink 1s step-end infinite; }
  </style>

  <!-- Terminal window bg -->
  <rect width="630" height="446" fill="#0c0c0c" rx="10"/>
  <rect width="630" height="446" fill="none" stroke="#3c3c3c" stroke-width="1" rx="10"/>

  <!-- Title bar -->
  <rect width="630" height="32" fill="#2d2d2d" rx="10"/>
  <rect y="20" width="630" height="12" fill="#2d2d2d"/>
  <circle cx="16" cy="16" r="6" fill="#f44747" opacity="0.9"/>
  <circle cx="36" cy="16" r="6" fill="#f59e0b" opacity="0.9"/>
  <circle cx="56" cy="16" r="6" fill="#6a9955" opacity="0.9"/>
  <text x="315" y="21" text-anchor="middle" class="ps" font-size="11" fill="#888888">
    Windows PowerShell — Administrator
  </text>

  <!-- Main prompt -->
  <text x="20" y="46" class="ps">
    <tspan fill="#ce9178">PS C:\Users\Python\Codey&gt;</tspan>
    <tspan fill="#569cd6"> codey.exe --status --tier ELDER --no-lies</tspan>
  </text>

  <text x="20" y="54" font-family="Cascadia Code,Courier New,monospace" font-size="11" fill="#f59e0b"># 🧹 SEASONAL: Refactor (1.2x XP active)</text>
  
  <text x="20" y="86" font-family="Cascadia Code,Courier New,monospace" font-size="11" fill="#888888"># BADGES: 🧙‍♂️ 👑 💎</text>

  <!-- Output header -->
  <text x="20" y="106" class="ps" fill="#9cdcfe">
    Initializing Codey audit... 🧙‍♂️ ELDER (10.0 years on GitHub)
  </text>
  <text x="20" y="122" class="ps" fill="#888888">──────────────────────────────────────────────────────────</text>

  <!-- Stat bars -->
  <g transform="translate(20, 134)">

    <text x="0" y="0"  class="ps">❤️  health    <tspan fill="#6a9955">[</tspan></text>
    <rect x="116" y="-12" width="280" height="12" class="bar-bg" rx="2"/>
    <rect x="116" y="-12" width="0"   height="12" fill="#f44747"    rx="2" class="grow-hp"/>
    <text x="400" y="0"  class="ps"><tspan fill="#6a9955">]</tspan> 33%</text>

    <text x="0" y="24" class="ps">🍖  hunger    <tspan fill="#6a9955">[</tspan></text>
    <rect x="116" y="12"  width="280" height="12" class="bar-bg" rx="2"/>
    <rect x="116" y="12"  width="0"   height="12" fill="#ce9178"    rx="2" class="grow-hu"/>
    <text x="400" y="24" class="ps"><tspan fill="#6a9955">]</tspan> 100%</text>

    <text x="0" y="48" class="ps">😊  happiness <tspan fill="#6a9955">[</tspan></text>
    <rect x="116" y="36"  width="280" height="12" class="bar-bg" rx="2"/>
    <rect x="116" y="36"  width="0"   height="12" fill="#c586c0" rx="2" class="grow-ha"/>
    <text x="400" y="48" class="ps"><tspan fill="#6a9955">]</tspan> 0%</text>

    <text x="0" y="72" class="ps">⚡  energy    <tspan fill="#6a9955">[</tspan></text>
    <rect x="116" y="60"  width="280" height="12" class="bar-bg" rx="2"/>
    <rect x="116" y="60"  width="0"   height="12" fill="#6a9955"    rx="2" class="grow-en"/>
    <text x="400" y="72" class="ps"><tspan fill="#6a9955">]</tspan> 0%</text>

    <text x="0" y="96" class="ps">👥  social    <tspan fill="#6a9955">[</tspan></text>
    <rect x="116" y="84"  width="280" height="12" class="bar-bg" rx="2"/>
    <rect x="116" y="84"  width="0"   height="12" fill="#f59e0b"          rx="2" class="grow-so"/>
    <text x="400" y="96" class="ps"><tspan fill="#6a9955">]</tspan> 1.25x</text>

    <text x="0" y="120" class="ps">💎  quality   <tspan fill="#6a9955">[</tspan></text>
    <rect x="116" y="108" width="280" height="12" class="bar-bg" rx="2"/>
    <rect x="116" y="108" width="0"   height="12" fill="#c586c0" rx="2" class="grow-qu"/>
    <text x="400" y="120" class="ps"><tspan fill="#6a9955">]</tspan> 0.83</text>

  </g>

  <!-- Divider -->
  <text x="20" y="278" class="ps" fill="#888888">──────────────────────────────────────────────────────────</text>

  <!-- Results -->
  <text x="20" y="296" class="ps" fill="#6a9955">[+] MOOD=EXHAUSTED | STREAK=5d | COMMITS=167 | STARS=605 | BUGS_FIXED=4</text>
  <text x="20" y="314" class="ps" fill="#6a9955">[+] XP_MULT=0.25x | PENALTIES=quality_curator</text>
  <text x="20" y="332" class="ps" fill="#888888">──────────────────────────────────────────────────────────</text>

  <!-- Pet + mood -->
  <text x="20" y="362" font-family="Cascadia Code,Courier New,monospace" font-size="28">🐍</text>
  <text x="56" y="358" font-family="Cascadia Code,Courier New,monospace" font-size="20">😵</text>
  <text x="84" y="358" class="ps" fill="#9cdcfe"> Python dev • ELDER tier • 10.0y</text>

  <!-- Warnings -->
  <text x="20" y="390" font-family="Cascadia Code,Courier New,monospace" font-size="11" fill="#f44747">[!] WARNING: HAPPINESS_CRITICAL</text><text x="20" y="406" font-family="Cascadia Code,Courier New,monospace" font-size="11" fill="#f44747">[!] WARNING: ENERGY_DEPLETED</text>

  <!-- Next prompt + blinking cursor -->
  <text x="20" y="422" class="ps">
    <tspan fill="#ce9178">PS C:\Users\Python\Codey&gt;</tspan>
    <tspan fill="#569cd6"> </tspan><tspan fill="#569cd6" class="blink">█</tspan>
  </text>

  <!-- Timestamp -->
  <text x="610" y="438" text-anchor="end"
        font-family="Cascadia Code,Courier New,monospace" font-size="9"
        fill="#888888">2026-03-03 21:58 UTC</text>

</svg>