    <!-- MOOD -->
    <text x="108" y="385" text-anchor="middle" font-family="Courier New,monospace" font-size="11" fill="#00ff88" opacity="0.8" filter="url(#glow)">MOOD > EXHAUSTED • 10.0y</text>
  </g>

  <!-- ══ STATS PANEL — exakte Inkscape koordinaten (identisch Cuty) ══ -->

  <!-- Header: x=265 y=74 -->
  <text x="265" y="74" fill="#00ff88" font-family="Courier New,monospace" font-size="15" font-weight="bold" filter="url(#glow)">user@codey:~$ cat Python.log</text>

  <!-- sep1: y=90 -->
  <line x1="263" y1="90" x2="630" y2="90" stroke="#00aaff" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>

  <!-- Bars: translate(265, 95) -->
