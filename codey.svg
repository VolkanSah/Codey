        <circle class="neon-ring"  cx="108" cy="175" r="8" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0"/>
        <circle class="neon-ring2" cx="108" cy="175" r="8" fill="none" stroke="#00aaff" stroke-width="1"   opacity="0"/>

        <!-- head -->
