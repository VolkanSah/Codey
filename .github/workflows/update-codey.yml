# it works local version :P
name: Update Codey 2.3
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  update-codey:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    # Step 1: Clone the repository to the runner
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true

    # Step 2: Prepare the Python environment
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # Step 3: Install required libraries
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi

    # Step 4: Run Codey update script
    - name: Update Codey
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        GIT_REPOSITORY: ${{ vars.GIT_REPOSITORY }}
      run: python update_codey.py

    # Step 5: Commit and push generated files
    - name: Commit
      run: |
        git config --local user.name "Codey Bot"
        git config --local user.email "action@github.com"

        # Stage generated assets
        git add codey.svg codey.json

        # git status --porcelain erkennt neue UND geänderte Dateien zuverlässig
        # git diff --cached erkennt neue (untracked) Dateien NICHT — daher dieser Fix
        if [ -z "$(git status --porcelain codey.svg codey.json)" ]; then
          echo "No changes to commit — skipping."
          exit 0
        fi

        git commit -m "🐾 Daily Codey update 🐾"

        # Pull erst, dann push — verhindert Konflikte bei parallelen Runs
        git pull --rebase origin ${{ github.ref_name }}
        git push || echo "⚠️ Push skipped (protected branch or no permission)"
